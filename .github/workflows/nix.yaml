on: [push, pull_request]

name: Nix

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deadnix:
    name: Dead code (deadnix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31
      - run: nix run nixpkgs#deadnix -- --fail .

  statix:
    name: Lint (statix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31
      - run: nix run nixpkgs#statix -- check .

  fmt:
    name: Format (nixfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31
      - run: nix run nixpkgs#nixfmt -- --check $(find . -name '*.nix')

  flake-check:
    name: Flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux aarch64-darwin
      - run: nix flake check
